<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MLflow drift loop</title>
    <meta
      name="description"
      content="A model-monitoring loop that detects drift, retrains a challenger, and promotes it — running live on real Kraków air-quality data."
    />
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <style>
      :root {
        --bg: #f7f6f3;
        --surface: #ffffff;
        --ink: #1a1917;
        --ink2: #57544e;
        --muted: #8a867d;
        --grid: #e7e5de;
        --line: #d7d5cc;
        --accent: #2a6fdb;
        --shadow: 0 1px 2px rgba(24, 22, 18, 0.04), 0 6px 20px rgba(24, 22, 18, 0.05);
        --radius: 14px;
      }
      * { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .wrap { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

      /* ---- header ---- */
      header { padding: 40px 0 8px; }
      h1 { margin: 0; font-size: 30px; letter-spacing: -0.02em; }
      .tagline { margin: 12px 0 0; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
      .tagline .step {
        font-size: 13px; font-weight: 500; color: var(--ink2);
        background: var(--surface); border: 1px solid var(--line);
        padding: 4px 10px; border-radius: 999px;
      }
      .tagline .arrow { color: var(--muted); font-size: 13px; }
      .built { color: var(--muted); font-size: 12.5px; margin: 14px 0 0; }

      /* ---- controls + intro ---- */
      .controls {
        margin: 26px 0 0; display: flex; flex-wrap: wrap; gap: 14px 20px;
        align-items: baseline; justify-content: space-between;
      }
      .field { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--ink2); }
      select {
        font: inherit; font-size: 14px; padding: 9px 34px 9px 13px;
        border: 1px solid var(--line); border-radius: 10px; background: var(--surface);
        color: var(--ink); cursor: pointer; appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2.5 4.5L6 8l3.5-3.5' stroke='%238a867d' stroke-width='1.4' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat; background-position: right 12px center;
      }
      select:hover { border-color: var(--muted); }
      .story { margin: 16px 0 0; font-size: 16px; color: var(--ink2); max-width: 68ch; }

      /* ---- stat tiles ---- */
      .tiles {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 14px; margin: 22px 0 6px;
      }
      .tile {
        background: var(--surface); border: 1px solid var(--grid); border-radius: 12px;
        padding: 14px 16px; box-shadow: var(--shadow);
      }
      .tile-v { font-size: 27px; font-weight: 650; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
      .tile-k { color: var(--muted); font-size: 12.5px; margin-top: 3px; }

      /* ---- charts ---- */
      .charts {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(470px, 1fr));
        gap: 18px; margin: 18px 0 8px;
      }
      .card {
        background: var(--surface); border: 1px solid var(--grid); border-radius: var(--radius);
        padding: 18px 18px 10px; box-shadow: var(--shadow); min-width: 0;
      }
      .card h3 { margin: 0; font-size: 17px; letter-spacing: -0.01em; }
      .card .desc { margin: 6px 0 4px; font-size: 13.5px; color: var(--ink2); }
      .plot { margin-top: 4px; }

      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }

      /* ---- footer ---- */
      footer { margin: 26px 0 48px; padding-top: 20px; border-top: 1px solid var(--grid); }
      .data-links { font-size: 13.5px; color: var(--ink2); }
      .data-links strong { color: var(--ink); font-weight: 600; }
      .foot-note { color: var(--muted); font-size: 12.5px; margin-top: 8px; }
      #error { color: #c0392b; padding: 16px 0; font-size: 14px; }

      @media (max-width: 560px) {
        header { padding-top: 28px; }
        h1 { font-size: 25px; }
        .charts { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>MLflow drift loop</h1>
        <div class="tagline" aria-label="the loop">
          <span class="step">track</span><span class="arrow">→</span>
          <span class="step">detect drift</span><span class="arrow">→</span>
          <span class="step">retrain a challenger</span><span class="arrow">→</span>
          <span class="step">promote</span>
        </div>
        <p class="built" id="built"></p>
      </header>

      <div class="controls">
        <label class="field">Data source&nbsp;<select id="profile"></select></label>
      </div>
      <p class="story" id="story"></p>

      <div class="tiles" id="tiles"></div>
      <div class="charts" id="charts"></div>
      <div id="error"></div>

      <footer>
        <div class="data-links" id="data-links"></div>
        <p class="foot-note">
          Interactive snapshot — hover, zoom, and toggle series on any chart. Rebuilt weekly
          from the MLflow backends. Source and the full Streamlit app on
          <a href="https://github.com/ldele/mlflow-drift-loop">GitHub</a>.
        </p>
      </footer>
    </div>
    <script src="app.js" defer></script>
  </body>
</html>
