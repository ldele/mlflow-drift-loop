# The chart palette is validated against the light chart surface (#fcfcfb),
# so pin the app to the light theme rather than letting the OS flip it.
[theme]
base = "light"
backgroundColor = "#fcfcfb"
secondaryBackgroundColor = "#f9f9f7"
textColor = "#0b0b0b"
font = "sans serif"

[server]
headless = true
